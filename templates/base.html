{% load static %}
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{% block title %}Graphene Trace{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="{% static 'css/styles.css' %}" rel="stylesheet">{% block extra_head %}{% endblock %}</head><body class="app-body"><div class="shell page-shell">{% if messages %}<div class="flash-stack">{% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }} mb-2">{{ message }}</div>{% endfor %}</div>{% endif %}{% block content %}{% endblock %}</div><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>{% block extra_js %}{% endblock %}</body></html>
