{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Graphene Trace</title>
  <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-page-label">Login</div>
  <div class="login-card card-soft">
    <h1>System Login</h1>
    {% if form.errors %}
      <div class="text-danger small mb-3">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label class="field-label">Username</label>
      <input class="field-input" type="text" name="username" placeholder="Enter username" required>
      <label class="field-label mt-3">Password</label>
      <input class="field-input" type="password" name="password" placeholder="••••••••" required>
      <label class="field-label mt-3">Login As</label>
      <select class="field-input" disabled>
        <option>Patient</option>
        <option>Clinician</option>
        <option>Admin</option>
      </select>
      <div class="btn-center mt-3">
        <button class="primary-btn login-btn" type="submit">Sign In</button>
      </div>
    </form>
    <div class="btn-center mt-3">
      <span class="brand-subtitle">Don't have an account? </span>
      <a href="/dashboard/register/" class="brand-subtitle" style="color: var(--accent);">Register</a>
    </div>
  </div>
</body>
</html>
